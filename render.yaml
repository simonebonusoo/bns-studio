services:
  - type: web
    name: bnsstudio-shop-api
    rootDir: .
    runtime: node
    plan: starter
    buildCommand: npm run render:build
    startCommand: npm run render:start
    disk:
      name: shop-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        value: file:/var/data/shop/dev.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: RENDER_DISK_PATH
        value: /var/data
      - key: ASSET_STORAGE_MODE
        value: local
      - key: PERSISTENT_STORAGE_ENABLED
        value: "true"
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYPAL_ME_LINK
        sync: false
      - key: PAYPAL_BUSINESS_EMAIL
        sync: false
      - key: PAYPAL_CURRENCY_CODE
        value: EUR
      - key: PAYPAL_STORE_NAME
        value: BNS Studio Shop
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: bns-studio/products
